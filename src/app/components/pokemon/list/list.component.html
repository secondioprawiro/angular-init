<section class="min-h-screen bg-gray-100">

  <!-- Header Banner -->
  <div class="bg-gradient-to-r from-red-500 to-red-700 px-6 py-8 text-white text-center shadow-lg">
    <h1 class="text-4xl font-extrabold tracking-tight drop-shadow">Pokédex</h1>
    <p class="text-red-100 mt-1 text-sm">{{ listFilterPokemon.length }} Pokémon ditemukan</p>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- Search Bar -->
    <div class="relative max-w-xl mx-auto mb-6">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔍</span>
      <input
        type="text"
        [(ngModel)]="search"
        (input)="filterPokemon()"
        placeholder="Cari Pokémon..."
        class="w-full pl-11 pr-5 py-3 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-400 shadow-sm text-gray-700 transition-all" />
    </div>

    <!-- Type Filters -->
    <div class="flex flex-wrap justify-center gap-2 mb-8">

      <!-- Tombol "All Types" -->
      <button
        (click)="selectType('')"
        class="px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition-all shadow-sm border-2"
        [class.border-red-500]="selectedElement === ''"
        [class.text-red-600]="selectedElement === ''"
        [class.bg-red-50]="selectedElement === ''"
        [class.border-gray-200]="selectedElement !== ''"
        [class.text-gray-500]="selectedElement !== ''"
        [class.bg-white]="selectedElement !== ''">
        🌐 Semua
      </button>

      <!--
        Tombol per tipe:
        - [style.background-color] pakai getTypeColor() jika tipe dipilih
        - conditional class untuk active vs inactive state
      -->
      <button
        *ngFor="let type of elements"
        (click)="selectType(type.name)"
        class="px-4 py-1.5 rounded-full text-sm font-bold capitalize whitespace-nowrap transition-all shadow-sm border-2"
        [style.background-color]="selectedElement === type.name ? getTypeColor(type.name) : ''"
        [style.border-color]="getTypeColor(type.name)"
        [class.text-white]="selectedElement === type.name"
        [class.text-gray-600]="selectedElement !== type.name"
        [class.bg-white]="selectedElement !== type.name">
        {{ type.name }}
      </button>

    </div>

    <!-- Loading Spinner -->
    <div *ngIf="isLoading || isSearching" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-red-500 border-t-transparent"></div>
      <span class="ml-4 text-gray-500 font-medium">Memuat Pokémon...</span>
    </div>

    <ng-container *ngIf="!isLoading && !isSearching">

      <!-- Empty State -->
      <div *ngIf="listFilterPokemon.length === 0" class="text-center py-20">
        <span class="text-6xl">😕</span>
        <p class="text-gray-500 mt-4 text-lg font-medium">Pokémon tidak ditemukan</p>
      </div>

      <!-- Pokemon Grid -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <app-card
          *ngFor="let pokemon of listFilterPokemon"
          [pokemon]="pokemon"
          [isHide]="true"
          [isFavorite]="false"
          [showDetailButton]="true"
          (navigateToDetail)="navigateToDetail($event)">
        </app-card>
      </div>

      <!-- Pagination -->
      <div class="flex flex-wrap items-center justify-center gap-2 mt-10 mb-6">

        <button
          (click)="loadPrevious()"
          [disabled]="!prevUrl"
          class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 font-bold rounded-xl disabled:opacity-30 hover:bg-gray-50 transition-colors shadow-sm">
          ← Prev
        </button>

        <!--
          pages getter di TS mengembalikan array max 5 halaman di sekitar halaman aktif
          currentPage === page → tampilkan sebagai active (merah)
        -->
        <button
          *ngFor="let page of pages"
          (click)="goToPage(page)"
          class="w-11 h-11 flex items-center justify-center font-bold rounded-xl transition-all shadow-sm border border-gray-200"
          [class.bg-red-500]="currentPage === page"
          [class.text-white]="currentPage === page"
          [class.scale-110]="currentPage === page"
          [class.bg-white]="currentPage !== page"
          [class.text-gray-700]="currentPage !== page"
          [class.hover:bg-red-100]="currentPage !== page">
          {{ page }}
        </button>

        <button
          (click)="loadNext()"
          [disabled]="!nextUrl"
          class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 font-bold rounded-xl disabled:opacity-30 hover:bg-gray-50 transition-colors shadow-sm">
          Next →
        </button>

      </div>

    </ng-container>
  </div>
</section>
