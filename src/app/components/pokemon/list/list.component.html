<section>
    <h2>Pokemon List</h2>

    <div class="mb-4">
        <input type="text" [(ngModel)]="search" (input)="filterPokemon()" placeholder="Search Pokemon..."
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors" />
    </div>

    <div class="flex flex-wrap gap-3 pb-4 mb-4">
        <button class="px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition-colors border"
            [class.bg-blue-600]="selectedElement === ''" [class.text-white]="selectedElement === ''"
            [class.border-blue-600]="selectedElement === ''" [class.bg-white]="selectedElement !== ''"
            [class.text-gray-600]="selectedElement !== ''" [class.border-gray-300]="selectedElement !== ''"
            (click)="selectType('')">
            All Types
        </button>
        <button *ngFor="let type of elements"
            class="px-4 py-1.5 rounded-full text-sm font-semibold capitalize whitespace-nowrap transition-colors border"
            [class.bg-blue-600]="selectedElement === type.name" [class.text-white]="selectedElement === type.name"
            [class.border-blue-600]="selectedElement === type.name" [class.bg-white]="selectedElement !== type.name"
            [class.text-gray-600]="selectedElement !== type.name"
            [class.border-gray-300]="selectedElement !== type.name" (click)="selectType(type.name)">
            {{ type.name }}
        </button>
    </div>

    <p *ngIf="isLoading || isSearching">Loading...</p>

    <ng-container *ngIf="!isLoading && !isSearching">
        <app-card *ngFor="let pokemon of listFilterPokemon" [pokemon]="pokemon" [isHide]="true"
            [isFavorite]="false"></app-card>

        <div class="flex flex-wrap items-center justify-center gap-2 mt-8">
            <button (click)="loadPrevious()" [disabled]="!prevUrl"
                class="px-4 py-2 bg-gray-200 text-gray-700 font-semibold rounded-lg disabled:opacity-40 hover:bg-gray-300 transition-colors">
                &laquo; Prev
            </button>

            <button *ngFor="let page of pages" (click)="goToPage(page)" [class.bg-blue-600]="currentPage === page"
                [class.text-white]="currentPage === page" [class.bg-gray-100]="currentPage !== page"
                [class.text-gray-700]="currentPage !== page"
                class="w-10 h-10 flex items-center justify-center font-semibold rounded-lg hover:bg-blue-500 hover:text-white transition-colors">
                {{ page }}
            </button>

            <button (click)="loadNext()" [disabled]="!nextUrl"
                class="px-4 py-2 bg-gray-200 text-gray-700 font-semibold rounded-lg disabled:opacity-40 hover:bg-gray-300 transition-colors">
                Next &raquo;
            </button>
        </div>
    </ng-container>
</section>
