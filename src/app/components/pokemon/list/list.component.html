<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Pokemon List</h2>

    <!-- Search Input -->
    <div class="mb-6 max-w-2xl mx-auto">
        <input type="text" [(ngModel)]="search" (input)="filterPokemon()" placeholder="Search Pokemon..."
            class="w-full px-5 py-3 border border-gray-300 rounded-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all shadow-sm" />
    </div>

    <!-- Type Filters -->
    <div class="flex flex-wrap justify-center gap-2 mb-10 max-w-4xl mx-auto">
        <button class="px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all shadow-sm border"
            [class.bg-blue-600]="selectedElement === ''" [class.text-white]="selectedElement === ''"
            [class.border-blue-600]="selectedElement === ''" [class.bg-white]="selectedElement !== ''"
            [class.text-gray-600]="selectedElement !== ''" [class.border-gray-200]="selectedElement !== ''"
            (click)="selectType('')">
            All Types
        </button>
        <button *ngFor="let type of elements"
            class="px-5 py-2 rounded-full text-sm font-semibold capitalize whitespace-nowrap transition-all shadow-sm border"
            [class.bg-blue-600]="selectedElement === type.name" [class.text-white]="selectedElement === type.name"
            [class.border-blue-600]="selectedElement === type.name" [class.bg-white]="selectedElement !== type.name"
            [class.text-gray-600]="selectedElement !== type.name"
            [class.border-gray-200]="selectedElement !== type.name" (click)="selectType(type.name)">
            {{ type.name }}
        </button>
    </div>

    <p *ngIf="isLoading || isSearching" class="text-center text-gray-500 my-10">Loading...</p>

    <ng-container *ngIf="!isLoading && !isSearching">
        <!-- Membungkus card ke dalam Grid Layout dengan gap yang lebih rapat -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-5 gap-4 lg:gap-6 justify-center">
            <app-card *ngFor="let pokemon of listFilterPokemon" 
                [pokemon]="pokemon" 
                [isHide]="true"
                [isFavorite]="false" 
                [showDetailButton]="true" 
                (navigateToDetail)="navigateToDetail($event)">
            </app-card>
        </div>

        <!-- Pagination -->
        <div class="flex flex-wrap items-center justify-center gap-2 mt-12 mb-8">
            <button (click)="loadPrevious()" [disabled]="!prevUrl"
                class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 font-semibold rounded-lg disabled:opacity-40 hover:bg-gray-50 transition-colors shadow-sm">
                &laquo; Prev
            </button>

            <button *ngFor="let page of pages" (click)="goToPage(page)" 
                [class.bg-blue-600]="currentPage === page"
                [class.text-white]="currentPage === page" 
                [class.bg-white]="currentPage !== page"
                [class.text-gray-700]="currentPage !== page"
                class="w-11 h-11 flex items-center justify-center font-semibold rounded-lg hover:bg-blue-500 hover:text-white transition-all shadow-sm border border-gray-200">
                {{ page }}
            </button>

            <button (click)="loadNext()" [disabled]="!nextUrl"
                class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 font-semibold rounded-lg disabled:opacity-40 hover:bg-gray-50 transition-colors shadow-sm">
                Next &raquo;
            </button>
        </div>
    </ng-container>
</section>
