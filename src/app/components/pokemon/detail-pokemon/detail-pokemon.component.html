<section class="p-6 max-w-2xl mx-auto">
    
    <!-- Tombol Kembali menggunakan fungsi goBack -->
    <button (click)="goBack()" class="mb-4 px-4 py-2 bg-gray-200 text-gray-700 font-medium rounded-lg hover:bg-gray-300 transition-colors">
        &larr; Kembali
    </button>

    <div *ngIf="pokemon" class="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold capitalize text-gray-800">{{pokemon.name}}</h1>
            
            <!-- Tombol Putar Suara memanggil fungsi hearCry -->
            <button (click)="hearCry()" class="px-5 py-2 bg-blue-500 text-white font-medium rounded-full hover:bg-blue-600 transition-colors shadow-sm flex items-center gap-2">
                🔊 Putar Suara
            </button>
        </div>

        <div class="bg-gray-50 rounded-lg p-8 flex justify-center mb-6">
            <img [src]="pokemon.image" alt="{{pokemon.name}}" class="w-48 h-48 object-contain filter drop-shadow-md">
        </div>

        <div>
            <h2 class="text-xl font-bold border-b border-gray-200 pb-2 mb-4 text-gray-700">Stats</h2>
            <ul class="grid grid-cols-2 gap-4">
                <!-- gunakan pokemon.stats karena sudah didefinisikan di interface sebelumnya -->
                <li *ngFor="let stat of pokemon.stats" class="bg-gray-50 p-3 rounded-lg flex justify-between">
                    <span class="capitalize font-medium text-gray-600">{{stat.stat.name}}</span>
                    <span class="font-bold text-gray-800">{{stat.base_stat}}</span>
                </li>
            </ul>
        </div>
    </div>
</section>
