<div class="pokemon-card rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 hover:-translate-y-2 flex flex-col h-full"
     [style.background]="getCardGradient()">

  <!-- ID di pojok kanan atas -->
  <div class="flex justify-end px-3 pt-3">
    <span class="text-xs font-bold text-white opacity-60">
      #{{ pokemon.id.toString().padStart(3, '0') }}
    </span>
  </div>

  <!-- Gambar Pokemon -->
  <div class="flex justify-center px-4 pb-1">
    <img [src]="pokemon.image" [alt]="pokemon.name"
         class="card-img w-28 h-28 object-contain drop-shadow-lg">
  </div>

  <!-- Info: nama, tipe, tombol (background putih dengan rounded atas) -->
  <div class="bg-white rounded-t-3xl px-4 pt-3 pb-4 flex flex-col flex-1">

    <h2 class="text-sm font-bold capitalize text-gray-800 text-center mb-2">
      {{ pokemon.name }}
    </h2>

    <!-- Type Badges — [ngClass]="type" pakai CSS class dari card.component.css -->
    <div class="flex flex-wrap justify-center gap-1 mb-3">
      <span *ngFor="let type of pokemon.types"
            class="type-badge px-2.5 py-0.5 rounded-full text-xs font-bold text-white"
            [ngClass]="type">
        {{ type }}
      </span>
    </div>

    <!-- Tombol di bawah — mt-auto agar selalu di bawah card -->
    <div class="mt-auto flex gap-2">

      <!-- Tombol Favorite (tersembunyi jika isHide = true) -->
      <button *ngIf="!isHide"
              (click)="toogleFavorite()"
              class="flex-1 py-2 rounded-xl text-xs font-bold transition-all duration-200"
              [class.bg-red-100]="isFavorite"
              [class.text-red-500]="isFavorite"
              [class.hover:bg-red-200]="isFavorite"
              [class.bg-yellow-400]="!isFavorite"
              [class.text-white]="!isFavorite"
              [class.hover:bg-yellow-500]="!isFavorite">
        {{ isFavorite ? '💔 Remove' : '⭐ Favorite' }}
      </button>

      <!-- Tombol Detail -->
      <button *ngIf="showDetailButton"
              (click)="onNavigateToDetail()"
              class="flex-1 py-2 rounded-xl text-xs font-bold bg-gray-800 text-white hover:bg-gray-700 transition-colors">
        Detail →
      </button>

    </div>
  </div>
</div>
