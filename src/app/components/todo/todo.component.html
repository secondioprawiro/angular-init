<div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded shadow-sm border border-gray-200">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">To-Do List</h1>

    <!-- Input Section -->
    <div class="flex gap-2 mb-8">
        <input 
            type="text" 
            [(ngModel)]="newTodoText" 
            (keyup.enter)="addTodo()"
            placeholder="Tambah tugas baru..." 
            class="flex-1 p-2 border-b-2 border-gray-100 focus:border-blue-500 outline-none transition-colors"
        >
        <button 
            (click)="addTodo()"
            class="px-4 py-2 bg-blue-500 text-white rounded font-medium hover:bg-blue-600 transition-colors"
        >
            Tambah
        </button>
    </div>

    <!-- List Section -->
    <ul class="space-y-4">
        @for (todo of todos; track todo.id) {
            <li class="flex items-center justify-between pb-3 border-b border-gray-50 group">
                <div class="flex items-center gap-3">
                    <input 
                        type="checkbox" 
                        [checked]="todo.isCompleted" 
                        (change)="toggleTodo(todo)"
                        class="w-5 h-5 cursor-pointer accent-blue-500"
                    >
                    <span 
                        [class.line-through]="todo.isCompleted" 
                        [class.text-gray-400]="todo.isCompleted"
                        class="text-gray-700"
                    >
                        {{ todo.task }}
                    </span>
                </div>
                <button 
                    (click)="deleteTodo(todo.id)"
                    class="text-red-400 opacity-0 group-hover:opacity-100 transition-opacity text-sm font-medium"
                >
                    Hapus
                </button>
            </li>
        } @empty {
            <li class="text-center py-10 text-gray-400 italic">
                Belum ada tugas hari ini.
            </li>
        }
    </ul>
    
    <!-- Info -->
    <div class="mt-8 text-xs text-gray-400 text-right">
        Total: {{ todos.length }} tugas
    </div>
</div>
