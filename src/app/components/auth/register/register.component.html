<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Daftar Akun</h2>
    <p class="auth-subtitle">Buat akun baru untuk melanjutkan</p>

    <form #registerForm="ngForm" (ngSubmit)="registerForm.form.valid && onSubmit()">

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="user.email"
          #email="ngModel"
          required
          email
          placeholder="Masukkan email Anda"
          [class.input-error]="email.invalid && email.touched"
        >
        <div class="error-messages" *ngIf="email.invalid && email.touched">
          <span *ngIf="email.errors?.['required']">Email harus diisi.</span>
          <span *ngIf="email.errors?.['email']">Format email tidak valid.</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="user.password"
          #password="ngModel"
          required
          minlength="6"
          placeholder="Minimal 6 karakter"
          [class.input-error]="password.invalid && password.touched"
        >
        <div class="error-messages" *ngIf="password.invalid && password.touched">
          <span *ngIf="password.errors?.['required']">Password harus diisi.</span>
          <span *ngIf="password.errors?.['minlength']">Password minimal 6 karakter.</span>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid">
        Daftar
      </button>

    </form>

    <p class="auth-footer">
      Sudah punya akun? <a routerLink="/login">Masuk di sini</a>
    </p>
  </div>
</div>
