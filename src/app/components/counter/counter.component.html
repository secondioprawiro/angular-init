<section class="flex flex-col items-center justify-center p-6 bg-white rounded-xl shadow-md max-w-sm mx-auto mt-8 border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Counter Value: <span class="text-blue-600">{{ counter }}</span></h2>
    
    <div class="flex gap-4">
        <button 
            (click)="decCounter()" 
            class="px-4 py-2 bg-red-500 text-white font-semibold rounded-lg hover:bg-red-600 transition-colors shadow-sm">
            - Decrease
        </button>
        <button 
            (click)="resetCounter()" 
            class="px-4 py-2 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition-colors shadow-sm">
            Reset
        </button>
        <button 
            (click)="addCounter()" 
            class="px-4 py-2 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-600 transition-colors shadow-sm">
            + Increase
        </button>
    </div>
</section>
